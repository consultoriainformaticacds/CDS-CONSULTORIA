<!-- SECCIÓN CONTACTO: Con tu ID de Formspree y nombres de campos -->
<section id="contacto">
  <div class="contacto-grid">
    <div class="contacto-info">
      <h2 class="section-title">Contacto</h2>
      <p>Contanos tu situación y en menos de 24 horas te respondemos.</p>
      <ul class="contacto-datos">
        <li><strong>WhatsApp:</strong> +54 9 11 2463-2544</li>
        <li><strong>Ubicación:</strong> CABA, Argentina</li>
      </ul>
    </div>
    
    <!-- Acción configurada con tu ID maqpkdog -->
    <form class="contacto-form" id="cdsForm" action="https://formspree.io/f/maqpkdog" method="POST">
      <div class="form-field">
        <label for="nombre">Nombre</label>
        <input type="text" name="name" id="nombre" required placeholder="Tu nombre" />
      </div>
      <div class="form-field">
        <label for="email">Email</label>
        <input type="email" name="email" id="email" required placeholder="tu@email.com" />
      </div>
      <div class="form-field">
        <label for="servicio">Servicio</label>
        <select name="service" id="servicio" required>
          <option value="" disabled selected>Seleccioná una opción</option>
          <option value="Ciberseguridad">Ciberseguridad</option>
          <option value="Soporte IT">Soporte IT</option>
          <option value="Seguridad Electronica">Seguridad Electrónica</option>
          <option value="Diseno Web">Diseño Web (Nexo)</option>
        </select>
      </div>
      <div class="form-field">
        <label for="mensaje">Mensaje</label>
        <textarea name="message" id="mensaje" required placeholder="¿Cómo podemos ayudarte?"></textarea>
      </div>
      <button type="submit" class="form-submit" id="cds-btn">Enviar consulta →</button>
      <p id="form-status" style="margin-top: 15px; font-weight: 600; text-align: center;"></p>
    </form>
  </div>
</section>
