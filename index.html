<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Page Title</title>
    <meta name="description" content="A brief description of your page for SEO purposes.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://www.yourwebsite.com/your-page-url">
    <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "WebPage",
            "name": "Your Page Name",
            "description": "A brief description of your page for structured data.",
            "url": "https://www.yourwebsite.com/your-page-url"
        }
    </script>
    <meta property="og:title" content="Your Open Graph Title" />
    <meta property="og:description" content="Your Open Graph description" />
    <meta property="og:url" content="https://www.yourwebsite.com/your-page-url" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://www.yourwebsite.com/path/to/image.jpg" />
</head>
<body>
    <header>
        <h1>Welcome to Our Page</h1>
    </header>
    <main>
        <article>
            <h2>Main Content</h2>
            <p>Your page content goes here.</p>
        </article>
    </main>
    <footer>
        <p>© 2026 Your Website. All Rights Reserved.</p>
    </footer>
</body>
</html>
