<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ecosistema CDS · NEXO</title>
  <link rel="stylesheet" href="src/css/ecosistema.css">
</head>
<body>

  <h1>Mapa de negocio · CDS &amp; NEXO</h1>

  <div class="card">
    <svg width="100%" viewBox="0 0 680 540">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="#3d4258" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
        <marker id="arrow-dash" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="#2d3448" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>

      <!-- CDS MADRE -->
      <g class="node c-purple">
        <rect x="200" y="20" width="280" height="60" rx="8" stroke-width="0.5"/>
        <text class="th" x="340" y="43" text-anchor="middle" dominant-baseline="central">Consultoría Informática CDS</text>
        <text class="ts" x="340" y="63" text-anchor="middle" dominant-baseline="central">Marca madre · paraguas de todo</text>
      </g>

      <!-- Flechas madre a ramas -->
      <line x1="270" y1="80" x2="180" y2="155" class="arr" marker-end="url(#arrow)"/>
      <line x1="410" y1="80" x2="500" y2="155" class="arr" marker-end="url(#arrow)"/>

      <!-- RAMA 1: CDS Seguridad -->
      <g class="node c-coral">
        <rect x="40" y="155" width="230" height="68" rx="8" stroke-width="0.5"/>
        <text class="th" x="155" y="178" text-anchor="middle" dominant-baseline="central">CDS · Seguridad</text>
        <text class="ts" x="155" y="200" text-anchor="middle" dominant-baseline="central">Pentesting · Hardening · Cámaras</text>
      </g>

      <!-- RAMA 2: NEXO Web -->
      <g class="node c-teal">
        <rect x="410" y="155" width="230" height="68" rx="8" stroke-width="0.5"/>
        <text class="th" x="525" y="178" text-anchor="middle" dominant-baseline="central">NEXO · Desarrollo Web</text>
        <text class="ts" x="525" y="200" text-anchor="middle" dominant-baseline="central">Webs · Landing pages · SEO</text>
      </g>

      <!-- Flechas a clientes -->
      <line x1="155" y1="223" x2="120" y2="305" class="arr" marker-end="url(#arrow)"/>
      <line x1="155" y1="223" x2="340" y2="305" class="arr" marker-end="url(#arrow)"/>
      <line x1="525" y1="223" x2="340" y2="305" class="arr" marker-end="url(#arrow)"/>
      <line x1="525" y1="223" x2="560" y2="305" class="arr" marker-end="url(#arrow)"/>

      <!-- CLIENTES -->
      <g class="node c-gray">
        <rect x="40" y="305" width="160" height="56" rx="8" stroke-width="0.5"/>
        <text class="th" x="120" y="325" text-anchor="middle" dominant-baseline="central">Empresas</text>
        <text class="ts" x="120" y="345" text-anchor="middle" dominant-baseline="central">Infraestructura · IT</text>
      </g>

      <g class="node c-gray">
        <rect x="250" y="305" width="180" height="56" rx="8" stroke-width="0.5"/>
        <text class="th" x="340" y="325" text-anchor="middle" dominant-baseline="central">Clientes cruzados</text>
        <text class="ts" x="340" y="345" text-anchor="middle" dominant-baseline="central">Web + Seguridad</text>
      </g>

      <g class="node c-gray">
        <rect x="480" y="305" width="160" height="56" rx="8" stroke-width="0.5"/>
        <text class="th" x="560" y="325" text-anchor="middle" dominant-baseline="central">Negocios</text>
        <text class="ts" x="560" y="345" text-anchor="middle" dominant-baseline="central">Pymes · Emprendedores</text>
      </g>

      <!-- OPORTUNIDAD -->
      <rect x="100" y="415" width="480" height="56" rx="8" class="opp-rect"/>
      <text class="th" x="340" y="436" text-anchor="middle" dominant-baseline="central" fill="#64748b">Oportunidad sin explotar</text>
      <text class="ts" x="340" y="456" text-anchor="middle" dominant-baseline="central" fill="#475569">Upsell: cliente de NEXO → auditoría de seguridad CDS</text>

      <line x1="155" y1="361" x2="200" y2="413" stroke="#2d3448" stroke-width="0.5" stroke-dasharray="4 3" fill="none" marker-end="url(#arrow-dash)"/>
      <line x1="340" y1="361" x2="340" y2="413" stroke="#2d3448" stroke-width="0.5" stroke-dasharray="4 3" fill="none" marker-end="url(#arrow-dash)"/>
      <line x1="560" y1="361" x2="480" y2="413" stroke="#2d3448" stroke-width="0.5" stroke-dasharray="4 3" fill="none" marker-end="url(#arrow-dash)"/>
    </svg>
  </div>

  <footer>Consultoría Informática CDS · Estructura de negocio 2026</footer>

</body>
</html>
